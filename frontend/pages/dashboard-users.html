<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Users</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">NTK Admin</a>
    <div class="topbar-right">
      <span class="topbar-user">Signed in as <span id="adminName">Admin</span></span>
      <a href="#" class="btn-logout" id="logoutBtn">Logout</a>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html" class="sidebar-link">
        <span class="icon">📊</span> Overview
      </a>
      <a href="dashboard-messages.html" class="sidebar-link">
        <span class="icon">✉️</span> Messages
      </a>
      <a href="dashboard-users.html" class="sidebar-link active">
        <span class="icon">👥</span> Users
      </a>
      <a href="dashboard-edit.html" class="sidebar-link">
        <span class="icon">✏️</span> Edit Portfolio
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="../index.html">← View Portfolio</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="page-header">
      <h1>All <span>Users</span></h1>
      <p>All registered accounts on your portfolio.</p>
    </div>

    <div class="table-section">
      <div class="table-section-header">
        <h2>Users <span id="userCount" style="color:var(--ink-light); font-weight:400; font-size:0.85rem;"></span></h2>
      </div>
      <div id="usersTableWrap">
        <div class="loading">Loading users...</div>
      </div>
    </div>
  </main>

  <script>
    const API = 'https://my-portfolio-production-830c.up.railway.app';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (!token || !user || user.role !== 'admin') {
      window.location.href = '/frontend/pages/login.html';
    }

    if (user) {
      document.getElementById('adminName').textContent = user.name || 'Admin';
    }

    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/frontend/pages/login.html';
    });

    function formatDate(str) {
      if (!str) return '—';
      return new Date(str).toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    async function loadUsers() {
      const wrap = document.getElementById('usersTableWrap');
      try {
        const res = await fetch(`${API}/api/admin/users`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const users = Array.isArray(data) ? data : (data.users || []);

        document.getElementById('userCount').textContent = `(${users.length})`;

        if (users.length === 0) {
          wrap.innerHTML = '<div class="empty-state">No users yet.</div>';
          return;
        }

        wrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody>
              ${users.map((u, i) => `
                <tr>
                  <td style="color:var(--ink-light)">${i + 1}</td>
                  <td>
                    <div style="display:flex; align-items:center; gap:10px;">
                      <div style="width:32px; height:32px; border-radius:50%; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:var(--accent); flex-shrink:0;">
                        ${getInitials(u.name)}
                      </div>
                      <span style="font-weight:600; color:var(--ink)">${u.name || '—'}</span>
                    </div>
                  </td>
                  <td>${u.email || '—'}</td>
                  <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-visitor'}">${u.role || 'visitor'}</span></td>
                  <td>${formatDate(u.createdAt)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        wrap.innerHTML = `<div class="error-msg">Failed to load users. ${err.message}</div>`;
      }
    }

    loadUsers();
  </script>
</body>
</html>
